apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "discourse.configmapName" . }}
  labels:
    {{- include "discourse.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  # -- Site identity --
  DISCOURSE_HOSTNAME: {{ required "discourse.hostname is required" .Values.discourse.hostname | quote }}
  {{- if .Values.discourse.developerEmails }}
  DISCOURSE_DEVELOPER_EMAILS: {{ .Values.discourse.developerEmails | quote }}
  {{- end }}

  # -- Database --
  DISCOURSE_DB_HOST: {{ required "discourse.database.host is required" .Values.discourse.database.host | quote }}
  DISCOURSE_DB_PORT: {{ .Values.discourse.database.port | quote }}
  DISCOURSE_DB_NAME: {{ .Values.discourse.database.name | quote }}
  DISCOURSE_DB_USERNAME: {{ .Values.discourse.database.username | quote }}
  DISCOURSE_DB_POOL: {{ .Values.discourse.database.pool | quote }}

  # -- Redis --
  DISCOURSE_REDIS_HOST: {{ .Values.discourse.redis.host | quote }}
  DISCOURSE_REDIS_PORT: {{ .Values.discourse.redis.port | quote }}

  # -- SMTP --
  {{- if .Values.discourse.smtp.address }}
  DISCOURSE_SMTP_ADDRESS: {{ .Values.discourse.smtp.address | quote }}
  {{- end }}
  {{- if .Values.discourse.smtp.port }}
  DISCOURSE_SMTP_PORT: {{ .Values.discourse.smtp.port | quote }}
  {{- end }}
  {{- if .Values.discourse.smtp.domain }}
  DISCOURSE_SMTP_DOMAIN: {{ .Values.discourse.smtp.domain | quote }}
  {{- end }}
  {{- if .Values.discourse.smtp.username }}
  DISCOURSE_SMTP_USER_NAME: {{ .Values.discourse.smtp.username | quote }}
  {{- end }}
  {{- if .Values.discourse.smtp.authentication }}
  DISCOURSE_SMTP_AUTHENTICATION: {{ .Values.discourse.smtp.authentication | quote }}
  {{- end }}
  DISCOURSE_SMTP_ENABLE_START_TLS: {{ .Values.discourse.smtp.enableStartTls | quote }}

  {{- if .Values.discourse.s3.enabled }}
  # -- S3 object storage --
  # Non-secret S3 settings. Discourse auto-enables S3 once it sees
  # bucket + region + (IAM | access keys); see values.yaml for the details.
  # DISCOURSE_USE_S3 is rendered for parity with Discourse's docker S3 template
  # but is inert in this release -- the bucket/region/creds trio is the switch.
  DISCOURSE_USE_S3: "true"
  DISCOURSE_S3_REGION: {{ required "discourse.s3.region is required when discourse.s3.enabled" .Values.discourse.s3.region | quote }}
  DISCOURSE_S3_BUCKET: {{ required "discourse.s3.bucket is required when discourse.s3.enabled" .Values.discourse.s3.bucket | quote }}
  {{- if .Values.discourse.s3.endpoint }}
  DISCOURSE_S3_ENDPOINT: {{ .Values.discourse.s3.endpoint | quote }}
  {{- end }}
  {{- if .Values.discourse.s3.cdnUrl }}
  DISCOURSE_S3_CDN_URL: {{ .Values.discourse.s3.cdnUrl | quote }}
  {{- end }}
  {{- if .Values.discourse.s3.useIamProfile }}
  DISCOURSE_S3_USE_IAM_PROFILE: "true"
  {{- end }}
  {{- if .Values.discourse.s3.backups.enabled }}
  # backup_location / s3_backup_bucket are site settings; Discourse shadows them
  # from the matching DISCOURSE_* env vars at boot.
  DISCOURSE_BACKUP_LOCATION: "s3"
  DISCOURSE_S3_BACKUP_BUCKET: {{ required "discourse.s3.backups.bucket is required when discourse.s3.backups.enabled" .Values.discourse.s3.backups.bucket | quote }}
  {{- end }}
  {{- end }}

  # -- Serving --
  DISCOURSE_SERVE_STATIC_ASSETS: {{ .Values.discourse.serveStaticAssets | quote }}
  DISCOURSE_FORCE_HTTPS: {{ .Values.discourse.forceHttps | quote }}

  # -- Unicorn --
  UNICORN_WORKERS: {{ .Values.discourse.unicornWorkers | quote }}
  # Prevent Unicorn from spawning Sidekiq -- we run Sidekiq as a separate container
  UNICORN_SIDEKIQS: "0"
  # Bind to all interfaces so the Service can reach port 3000
  UNICORN_BIND_ALL: "1"

  # -- Per-IP rate limits (request_tracker middleware) --
  DISCOURSE_MAX_REQS_PER_IP_PER_10_SECONDS: {{ .Values.rateLimits.perIpPer10Seconds | quote }}
  DISCOURSE_MAX_REQS_PER_IP_PER_MINUTE: {{ .Values.rateLimits.perIpPerMinute | quote }}
  DISCOURSE_MAX_ASSET_REQS_PER_IP_PER_10_SECONDS: {{ .Values.rateLimits.assetPerIpPer10Seconds | quote }}
  DISCOURSE_MAX_REQS_PER_IP_MODE: {{ .Values.rateLimits.mode | quote }}
