# =============================================================================
# Discourse Helm Chart -- values.yaml
# =============================================================================
# Deploys Discourse on Kubernetes using a slim-based custom image with separate
# Unicorn and Sidekiq containers plus a Redis sidecar.
# See CLAUDE.md for architecture details.
# =============================================================================

# ---------------------------------------------------------------------------
# Discourse container image
# ---------------------------------------------------------------------------
# You MUST set image.repository to your custom-built Discourse image
# (extends discourse/base:slim with baked-in plugins and precompiled assets).
# If tag is empty, defaults to Chart.appVersion.
image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Redis sidecar
# ---------------------------------------------------------------------------
# Ephemeral Redis in the same pod (no PVC). Used for Sidekiq job queue,
# caching, and MessageBus. NOT a data store -- PostgreSQL is the source
# of truth.
redis:
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi

# ---------------------------------------------------------------------------
# Discourse configuration
# ---------------------------------------------------------------------------
discourse:
  # REQUIRED -- the public hostname for the forum (e.g. forum.example.com)
  hostname: ""

  # REQUIRED for first boot -- comma-separated emails that get initial admin
  developerEmails: ""

  # -- Admin account (first boot only) --
  admin:
    username: "admin"
    email: ""
    name: "Admin User"
    # Inline password (>= 15 chars for admin). Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for admin password
    existingSecret: ""
    secretKey: admin-password

  # -- PostgreSQL (external, e.g. CNPG) --
  database:
    host: ""
    port: 5432
    name: discourse
    username: discourse
    pool: 8
    # Inline password. Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for the database password
    existingSecret: ""
    secretKey: db-password

  # -- Redis --
  # Defaults point to the sidecar at localhost. Override only if using an
  # external Redis.
  redis:
    host: localhost
    port: 6379

  # -- SMTP --
  smtp:
    address: ""
    port: 587
    domain: ""
    username: ""
    authentication: plain
    enableStartTls: true
    # Inline password. Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for the SMTP password
    existingSecret: ""
    secretKey: smtp-password

  # -- Secret key base (Rails) --
  # 128-char hex string: openssl rand -hex 64
  secretKeyBase:
    # Inline value. Ignored if existingSecret is set.
    value: ""
    # Use an existing Secret for the secret key base
    existingSecret: ""
    secretKey: secret-key-base

  # -- Serving --
  # Serve static assets directly from Unicorn (no nginx in front)
  serveStaticAssets: true
  # Force HTTPS -- sets DISCOURSE_FORCE_HTTPS=true
  forceHttps: true

  # -- Performance tuning --
  # Number of Unicorn worker processes (Discourse default: 3)
  unicornWorkers: 3
  # Sidekiq concurrency (number of threads processing background jobs)
  sidekiqConcurrency: 5

  # -- Extra environment variables --
  # Passed directly to all Discourse containers (unicorn, sidekiq, migrate).
  # Use for any env vars not covered above.
  # Example:
  #   extraEnv:
  #     - name: DISCOURSE_S3_BUCKET
  #       value: "my-bucket"
  #     - name: DISCOURSE_S3_SECRET_ACCESS_KEY
  #       valueFrom:
  #         secretKeyRef:
  #           name: my-secret
  #           key: s3-secret
  extraEnv: []

# ---------------------------------------------------------------------------
# Per-IP rate limits
# ---------------------------------------------------------------------------
# Per-IP rate-limit budgets enforced by Discourse's request_tracker
# middleware. Defaults mirror Discourse upstream
# (config/discourse_defaults.conf). Tune higher for plugin-heavy
# installs where a single page load fans out to many asset requests.
# Reference: https://meta.discourse.org/t/global-rate-limits-and-throttling-in-discourse/78612
rateLimits:
  # Per-IP budget for non-asset routes, 10-second rolling window
  perIpPer10Seconds: 50
  # Per-IP budget for non-asset routes, 60-second window
  perIpPerMinute: 200
  # Per-IP budget for /assets/*, /uploads/*, /user_avatar/*, /svg-sprite, etc.
  assetPerIpPer10Seconds: 200
  # Enforcement mode: block | warn | warn+block | none
  # `warn+block` blocks AND logs trips (useful while tuning)
  mode: block

# ---------------------------------------------------------------------------
# Sidekiq container resources
# ---------------------------------------------------------------------------
# Separate resource configuration for the Sidekiq container.
sidekiq:
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi

# ---------------------------------------------------------------------------
# Init containers
# ---------------------------------------------------------------------------
initContainers:
  waitForPostgres:
    enabled: true
    image:
      repository: busybox
      tag: "1.37"
      pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Theme-CSS warmup
# ---------------------------------------------------------------------------
# Discourse compiles the theme+plugin CSS bundle via V8/PostCSS on the first
# HTML render when the on-disk file is missing. On ephemeral-fs pods that file
# is gone after every restart, so the first user request would freeze ~15-20s.
# This runs `rake assets:precompile:css` as an init container (after migrate,
# DB + Redis up) and shares the compiled output with the web container via an
# emptyDir mounted at /var/www/discourse/tmp/stylesheet-cache.
stylesheetWarmup:
  enabled: true
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    # The warmup compiles all theme/color-scheme variants; give it OOM
    # headroom. Because init containers count as max(init, sum(app
    # containers)) — not additive — this limit is effectively free up to the
    # pod's combined app-container limits.
    limits:
      memory: 3Gi

# ---------------------------------------------------------------------------
# Diagnostics (ptrace-free, in-process introspection)
# ---------------------------------------------------------------------------
# For capturing WHERE a request is blocked when the cluster forbids attaching
# external tracers (ptrace_scope=2, so no strace / gdb-attach). Both tools load
# in-process via RUBYOPT on the WEB container only and are OFF by default with
# zero overhead when off. They survive pitchfork's mold->worker fork: each
# worker is addressable by its own pid.
#
# Flip a toggle, roll the web pods, reproduce the freeze, capture, flip back.
diagnostics:
  # rbtrace -- live tracer over a SysV message queue (no ptrace). Ships in
  # Discourse core's Gemfile, so enabling is harmless. BUT it is BEST-EFFORT:
  # attaching needs the node's SysV msg-queue limits raised
  # (kernel.msgmax/kernel.msgmnb). On a stock node (msgmax=8192, msgmnb=16384)
  # the attach fails ("pid is not listening"), and rbtrace 0.5.3 is fragile on
  # Ruby 3.4. Prefer sigdump below; keep this only if you can tune the node.
  # Capture during a freeze (run INSIDE the web container; pid from `pgrep -af pitchfork`):
  #   kubectl exec -it <pod> -c web -- bundle exec rbtrace -p <pid> --backtraces
  #   # or slow-method watch:  bundle exec rbtrace -p <pid> --slow=1000
  #   # or eval a thread dump:  bundle exec rbtrace -p <pid> -e 'Thread.list.map(&:backtrace)'
  rbtrace:
    enabled: false
  # sigdump -- on a signal, dumps every thread's Ruby backtrace to a file.
  # RECOMMENDED primary tool: pure signal + file write, no SysV IPC and no node
  # tuning required (unlike rbtrace), so it works on a stock cluster.
  # NOTE: requires the image to be built with the sigdump gem (docker/Dockerfile
  # adds it to the bundle). Enabling this on an image WITHOUT sigdump crashes
  # Ruby at boot -> CrashLoopBackOff. Default trap signal is SIGCONT (does not
  # collide with pitchfork's INT/QUIT/TERM/USR1/USR2/TTIN/TTOU/WINCH/HUP).
  # Capture during a freeze (pid from `pgrep -af pitchfork`):
  #   kubectl exec <pod> -c web -- kill -CONT <pid>      # or: pkill -CONT -f pitchfork
  #   kubectl exec <pod> -c web -- sh -c 'cat /tmp/sigdump-*.log'   # one file per pid
  sigdump:
    enabled: false

# ---------------------------------------------------------------------------
# Persistent storage
# ---------------------------------------------------------------------------
# Mount paths use standard Discourse layout under /var/www/discourse.
persistence:
  # User uploads, avatars, attachments
  uploads:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""
    # Mount path inside the container
    mountPath: /var/www/discourse/public/uploads

  # Database backup archives
  backups:
    enabled: false
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""
    # Mount path inside the container
    mountPath: /var/www/discourse/public/backups

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  # Example:
  #   hosts:
  #     - host: forum.example.com
  #       paths:
  #         - path: /
  #           pathType: Prefix
  hosts: []
  # Example:
  #   tls:
  #     - secretName: forum-tls
  #       hosts:
  #         - forum.example.com
  tls: []

# ---------------------------------------------------------------------------
# Unicorn container resources
# ---------------------------------------------------------------------------
resources:
  requests:
    memory: 1Gi
    cpu: 500m
  limits:
    memory: 2Gi

# ---------------------------------------------------------------------------
# Service account
# ---------------------------------------------------------------------------
serviceAccount:
  create: false
  annotations: {}
  name: ""

# ---------------------------------------------------------------------------
# Pod scheduling
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Pod metadata and security
# ---------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}
podSecurityContext:
  # discourse user/group is uid/gid 1000 (discourse/base image). The shared
  # stylesheet-cache emptyDir is created root-owned by default; fsGroup makes
  # it group-writable so the warm-css init and web containers (both uid 1000)
  # can write/read it. OnRootMismatch avoids re-chowning the uploads PVC on
  # every restart.
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
securityContext: {}

restartPolicy: Always
terminationGracePeriodSeconds: 60
