# =============================================================================
# Discourse Helm Chart -- values.yaml
# =============================================================================
# Deploys Discourse on Kubernetes using a slim-based custom image with separate
# Unicorn and Sidekiq containers plus a Redis sidecar.
# See CLAUDE.md for architecture details.
# =============================================================================

# ---------------------------------------------------------------------------
# Discourse container image
# ---------------------------------------------------------------------------
# You MUST set image.repository to your custom-built Discourse image
# (extends discourse/base:slim with baked-in plugins and precompiled assets).
# If tag is empty, defaults to Chart.appVersion.
image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Redis sidecar
# ---------------------------------------------------------------------------
# Ephemeral Redis in the same pod (no PVC). Used for Sidekiq job queue,
# caching, and MessageBus. NOT a data store -- PostgreSQL is the source
# of truth.
redis:
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi

# ---------------------------------------------------------------------------
# Discourse configuration
# ---------------------------------------------------------------------------
discourse:
  # REQUIRED -- the public hostname for the forum (e.g. forum.example.com)
  hostname: ""

  # REQUIRED for first boot -- comma-separated emails that get initial admin
  developerEmails: ""

  # -- Admin account (first boot only) --
  admin:
    username: "admin"
    email: ""
    name: "Admin User"
    # Inline password (>= 15 chars for admin). Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for admin password
    existingSecret: ""
    secretKey: admin-password

  # -- PostgreSQL (external, e.g. CNPG) --
  database:
    host: ""
    port: 5432
    name: discourse
    username: discourse
    pool: 8
    # Inline password. Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for the database password
    existingSecret: ""
    secretKey: db-password

  # -- Redis --
  # Defaults point to the sidecar at localhost. Override only if using an
  # external Redis.
  redis:
    host: localhost
    port: 6379

  # -- SMTP --
  smtp:
    address: ""
    port: 587
    domain: ""
    username: ""
    authentication: plain
    enableStartTls: true
    # Inline password. Ignored if existingSecret is set.
    password: ""
    # Use an existing Secret for the SMTP password
    existingSecret: ""
    secretKey: smtp-password

  # -- Secret key base (Rails) --
  # 128-char hex string: openssl rand -hex 64
  secretKeyBase:
    # Inline value. Ignored if existingSecret is set.
    value: ""
    # Use an existing Secret for the secret key base
    existingSecret: ""
    secretKey: secret-key-base

  # -- S3/R2 object storage for USER UPLOADS (optional) --
  # Stores user uploads (and optionally backups) in an S3-compatible bucket
  # instead of the local uploads PVC. Works with AWS S3, MinIO, Cloudflare R2,
  # GCS (via the interop endpoint), etc.
  #
  # S3/R2 is used for USER UPLOADS only; Discourse's compiled JS/CSS assets are
  # always served locally by the app (optionally fronted by a CDN via
  # DISCOURSE_CDN_URL / a proxy). The chart never sets the global
  # DISCOURSE_S3_BUCKET, so use_s3? stays false and assets are never welded onto
  # S3. It emits the SiteSetting-shadow vars DISCOURSE_ENABLE_S3_UPLOADS +
  # DISCOURSE_S3_UPLOAD_BUCKET instead.
  s3:
    enabled: false
    # AWS-style region. For S3-compatible providers use the value the provider
    # expects (e.g. "auto" for R2, "us-east-1" as a generic default for MinIO).
    region: ""
    # Bucket that holds user uploads. May be "bucket" or "bucket/path-prefix".
    # Maps to the SiteSetting DISCOURSE_S3_UPLOAD_BUCKET.
    bucket: ""
    # Custom endpoint for non-AWS providers (MinIO / R2 / GCS). Leave empty for
    # real AWS S3. Must be a full URL, e.g. https://<accountid>.r2.cloudflarestorage.com
    endpoint: ""
    # Optional CDN in front of the bucket for serving uploads.
    cdnUrl: ""
    # Whether Discourse installs a CORS rule on the bucket via PutBucketCors as
    # part of its S3 setup prereq. Defaults true to match Discourse's own
    # default. Set to false for Cloudflare R2, which rejects the PutBucketCors
    # call -- set the CORS policy on the R2 bucket manually instead.
    installCorsRule: true
    # When true, authenticate via the pod's IAM role (EKS IRSA / instance
    # profile) and OMIT the access keys entirely -- no secret is rendered.
    useIamProfile: false
    # Inline credentials (ignored when useIamProfile=true or existingSecret set).
    accessKeyId: ""
    secretAccessKey: ""
    # Use an existing Secret for the S3 credentials instead of inline values.
    # Mirrors the database/smtp existingSecret pattern.
    existingSecret: ""
    secretKeys:
      accessKeyId: s3-access-key-id
      secretAccessKey: s3-secret-access-key
    # Store database backups in S3 as well. Reuses the same region/credentials.
    backups:
      enabled: false
      # Bucket for backups. Often the same as `bucket` with a different prefix,
      # or a dedicated bucket. Required when backups.enabled=true.
      bucket: ""

  # -- Serving --
  # Serve static assets directly from Unicorn (no nginx in front)
  serveStaticAssets: true
  # Force HTTPS -- sets DISCOURSE_FORCE_HTTPS=true
  forceHttps: true

  # -- Performance tuning --
  # Number of Unicorn worker processes (Discourse default: 3)
  unicornWorkers: 3
  # Sidekiq concurrency (number of threads processing background jobs)
  sidekiqConcurrency: 5

  # -- Extra environment variables --
  # Passed directly to all Discourse containers (unicorn, sidekiq, migrate).
  # Use for any env vars not covered above (e.g. plugin toggles, OIDC config).
  # Do NOT set the global DISCOURSE_S3_BUCKET here: it flips use_s3? true and
  # welds the compiled assets onto S3, which this chart deliberately avoids --
  # use the discourse.s3.* values for uploads-only S3/R2 instead.
  # Example:
  #   extraEnv:
  #     - name: DISCOURSE_OPENID_CONNECT_ENABLED
  #       value: "true"
  #     - name: DISCOURSE_OPENID_CONNECT_CLIENT_SECRET
  #       valueFrom:
  #         secretKeyRef:
  #           name: discourse-oidc
  #           key: client-secret
  extraEnv: []

# ---------------------------------------------------------------------------
# Per-IP rate limits
# ---------------------------------------------------------------------------
# Per-IP rate-limit budgets enforced by Discourse's request_tracker
# middleware. Defaults mirror Discourse upstream
# (config/discourse_defaults.conf). Tune higher for plugin-heavy
# installs where a single page load fans out to many asset requests.
# Reference: https://meta.discourse.org/t/global-rate-limits-and-throttling-in-discourse/78612
rateLimits:
  # Per-IP budget for non-asset routes, 10-second rolling window
  perIpPer10Seconds: 50
  # Per-IP budget for non-asset routes, 60-second window
  perIpPerMinute: 200
  # Per-IP budget for /assets/*, /uploads/*, /user_avatar/*, /svg-sprite, etc.
  assetPerIpPer10Seconds: 200
  # Enforcement mode: block | warn | warn+block | none
  # `warn+block` blocks AND logs trips (useful while tuning)
  mode: block

# ---------------------------------------------------------------------------
# Sidekiq container resources
# ---------------------------------------------------------------------------
# Separate resource configuration for the Sidekiq container.
sidekiq:
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi

# ---------------------------------------------------------------------------
# Init containers
# ---------------------------------------------------------------------------
initContainers:
  waitForPostgres:
    enabled: true
    image:
      repository: busybox
      tag: "1.37"
      pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Theme-CSS warmup
# ---------------------------------------------------------------------------
# Discourse compiles the theme+plugin CSS bundle via V8/PostCSS on the first
# HTML render when the on-disk file is missing. On ephemeral-fs pods that file
# is gone after every restart, so the first user request would freeze ~15-20s.
# This runs `rake assets:precompile:css` as an init container (after migrate,
# DB + Redis up) and shares the compiled output with the web container via an
# emptyDir mounted at /var/www/discourse/tmp/stylesheet-cache.
stylesheetWarmup:
  enabled: true
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    # The warmup compiles all theme/color-scheme variants; give it OOM
    # headroom. Because init containers count as max(init, sum(app
    # containers)) — not additive — this limit is effectively free up to the
    # pod's combined app-container limits.
    limits:
      memory: 3Gi

# ---------------------------------------------------------------------------
# Diagnostics (ptrace-free, in-process introspection)
# ---------------------------------------------------------------------------
# For capturing WHERE a request is blocked when the cluster forbids attaching
# external tracers (ptrace_scope=2, so no strace / gdb-attach). Both tools load
# in-process on the WEB container only and are OFF by default with zero overhead
# when off. They survive pitchfork's mold->worker fork: each worker is
# addressable by its own pid.
#
# Mechanism: each toggle sets an env var (DISCOURSE_DIAG_RBTRACE /
# DISCOURSE_DIAG_SIGDUMP) on the web container. A Rails initializer baked into
# the image (config/initializers/discourse_k8s_diagnostics.rb) reads it and
# `require`s the gem -- AFTER Bundler.setup, so the bundled gem resolves. (We do
# NOT use RUBYOPT: its preloads run before Bundler puts the bundle on the load
# path, so a bundled gem isn't loadable and the worker crashes at boot.)
#
# REQUIRES an image built with that initializer (image tag >= v0.10.0). On an
# OLDER image the toggle is simply inert -- the env var is read by an initializer
# the older image doesn't have, so nothing loads and nothing crashes.
#
# Flip a toggle, roll the web pods, reproduce the freeze, capture, flip back.
diagnostics:
  # rbtrace -- live tracer over a SysV message queue (no ptrace). Ships in
  # Discourse core's Gemfile, so loading is harmless. BUT it is BEST-EFFORT:
  # attaching needs the node's SysV msg-queue limits raised
  # (kernel.msgmax/kernel.msgmnb). On a stock node (msgmax=8192, msgmnb=16384)
  # the attach fails ("pid is not listening"), and rbtrace 0.5.3 is fragile on
  # Ruby 3.4. Prefer sigdump below; keep this only if you can tune the node.
  # Capture during a freeze (run INSIDE the web container; pid from `pgrep -af pitchfork`):
  #   kubectl exec -it <pod> -c web -- bundle exec rbtrace -p <pid> --backtraces
  #   # or slow-method watch:  bundle exec rbtrace -p <pid> --slow=1000
  #   # or eval a thread dump:  bundle exec rbtrace -p <pid> -e 'Thread.list.map(&:backtrace)'
  rbtrace:
    enabled: false
  # sigdump -- on a signal, dumps every thread's Ruby backtrace to a file.
  # RECOMMENDED primary tool: pure signal + file write, no SysV IPC and no node
  # tuning required (unlike rbtrace), so it works on a stock cluster.
  # The sigdump gem is in the image bundle (docker/Dockerfile adds it); the
  # initializer requires it only when this toggle is on. Default trap signal is
  # SIGCONT (does not collide with pitchfork's
  # INT/QUIT/TERM/USR1/USR2/TTIN/TTOU/WINCH/HUP).
  # Capture during a freeze (pid from `pgrep -af pitchfork`):
  #   kubectl exec <pod> -c web -- kill -CONT <pid>      # or: pkill -CONT -f pitchfork
  #   kubectl exec <pod> -c web -- sh -c 'cat /tmp/sigdump-*.log'   # one file per pid
  sigdump:
    enabled: false

# ---------------------------------------------------------------------------
# Persistent storage
# ---------------------------------------------------------------------------
# Mount paths use standard Discourse layout under /var/www/discourse.
persistence:
  # User uploads, avatars, attachments
  uploads:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""
    # Mount path inside the container
    mountPath: /var/www/discourse/public/uploads

  # Database backup archives
  backups:
    enabled: false
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""
    # Mount path inside the container
    mountPath: /var/www/discourse/public/backups

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  # Example:
  #   hosts:
  #     - host: forum.example.com
  #       paths:
  #         - path: /
  #           pathType: Prefix
  hosts: []
  # Example:
  #   tls:
  #     - secretName: forum-tls
  #       hosts:
  #         - forum.example.com
  tls: []

# ---------------------------------------------------------------------------
# Unicorn container resources
# ---------------------------------------------------------------------------
resources:
  requests:
    memory: 1Gi
    cpu: 500m
  limits:
    memory: 2Gi

# ---------------------------------------------------------------------------
# Service account
# ---------------------------------------------------------------------------
serviceAccount:
  create: false
  annotations: {}
  name: ""

# ---------------------------------------------------------------------------
# Common metadata (applied to EVERY resource this chart renders)
# ---------------------------------------------------------------------------
# Labels merged into the shared label set, so they land on the Deployment,
# Service, ConfigMap, Secret, Ingress, ServiceAccount and PVCs. NOT added to
# the immutable selector labels, so they're safe to change on an existing
# release. Handy for GitOps (e.g. ArgoCD instance/team tags).
commonLabels: {}
# Annotations merged into metadata.annotations of every rendered resource.
# Existing per-resource annotations (e.g. the PVC's helm.sh/resource-policy)
# are preserved, not clobbered.
commonAnnotations: {}

# ---------------------------------------------------------------------------
# Pod scheduling
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
# Assign the pod to a PriorityClass (must already exist in the cluster). Left
# empty by default so no PriorityClass is required.
priorityClassName: ""

# ---------------------------------------------------------------------------
# Extra volumes / volume mounts (escape hatch)
# ---------------------------------------------------------------------------
# Arbitrary extra pod volumes and the mounts that attach them to BOTH the web
# and sidekiq containers. Use for secrets, projected tokens, extra config, etc.
# Example:
#   extraVolumes:
#     - name: extra-config
#       configMap:
#         name: my-extra-config
#   extraVolumeMounts:
#     - name: extra-config
#       mountPath: /etc/discourse/extra
#       readOnly: true
extraVolumes: []
extraVolumeMounts: []

# ---------------------------------------------------------------------------
# Pod metadata and security
# ---------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}
podSecurityContext:
  # discourse user/group is uid/gid 1000 (discourse/base image). The shared
  # stylesheet-cache emptyDir is created root-owned by default; fsGroup makes
  # it group-writable so the warm-css init and web containers (both uid 1000)
  # can write/read it. OnRootMismatch avoids re-chowning the uploads PVC on
  # every restart.
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
# Container-level securityContext applied to the web + sidekiq containers.
securityContext:
  # The image's Dockerfile ends with `USER discourse` (uid/gid 1000); refuse to
  # start if some future base image regresses to root.
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  # A compromised process can't sudo/setuid its way to higher privileges.
  allowPrivilegeEscalation: false
  # MUST stay false: Discourse writes to tmp/ (pids, sockets, the pitchfork
  # mold) and to the on-disk stylesheet cache at runtime, so the root fs has to
  # be writable. We still drop everything else below.
  readOnlyRootFilesystem: false
  capabilities:
    # Discourse needs no Linux capabilities; drop the whole default set.
    drop:
      - ALL
  seccompProfile:
    # Use the container runtime's default seccomp profile instead of running
    # unconfined (the K8s default when this is unset).
    type: RuntimeDefault

restartPolicy: Always
terminationGracePeriodSeconds: 60
