# =============================================================================
# Helm chart CI/CD
# =============================================================================
# Lints and validates the Discourse Helm chart on every push/PR.
# Packages and pushes to GHCR as an OCI artifact only on tag push
# matching `chart/v*`.
#
# Trigger examples:
#   git tag chart/v0.1.0 && git push origin chart/v0.1.0
# =============================================================================

name: Helm

on:
  push:
    branches: [main]
    paths: ["chart/**"]
    tags: ["chart/v*"]
  pull_request:
    paths: ["chart/**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint chart/

      - name: Validate templates render
        run: |
          helm template test chart/ \
            --set image.repository=test \
            --set discourse.hostname=test.example.com \
            --set discourse.database.host=postgres.svc

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/chart/v')
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Override the workflow default (contents: read): the release step needs
    # contents: write to create a GitHub Release; packages: write is still
    # required to push the chart OCI artifact.
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Login to GHCR OCI registry
        run: |
          helm registry login ghcr.io \
            -u "${{ github.actor }}" \
            -p "${{ github.token }}"

      - name: Extract version from tag
        id: version
        run: |
          # Strip "chart/v" prefix (e.g., chart/v0.1.0 -> 0.1.0)
          VERSION="${GITHUB_REF#refs/tags/chart/v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.value }}/" chart/Chart.yaml
          echo "Chart.yaml after version update:"
          grep -E '^(version|appVersion):' chart/Chart.yaml

      - name: Package chart
        run: helm package chart/

      - name: Push chart to GHCR
        run: |
          helm push "discourse-${{ steps.version.outputs.value }}.tgz" \
            oci://ghcr.io/${{ github.repository_owner }}/helm-charts

      # ===========================================================================
      # Publish a GitHub Release for this chart tag
      # ===========================================================================
      # Unlike the image, the packaged chart IS a real file, so we attach the
      # discourse-<version>.tgz as a downloadable release asset and put the OCI
      # install instructions in the body.
      # ===========================================================================
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          app_version="$(grep -oP '^appVersion:\s*"?\K[^"]+' chart/Chart.yaml)"
          {
            echo "Helm chart for deploying Discourse on Kubernetes."
            echo
            echo "**appVersion (Discourse):** \`${app_version}\`"
            echo
            echo "### Install (OCI)"
            echo '```bash'
            echo "helm upgrade --install discourse \\"
            echo "  oci://ghcr.io/${OWNER}/helm-charts/discourse \\"
            echo "  --version ${VERSION} -n discourse --create-namespace"
            echo '```'
            echo
            echo "The packaged chart \`discourse-${VERSION}.tgz\` is attached below."
          } > release-notes.md
          gh release create "chart/v${VERSION}" \
            --repo "${REPO}" \
            --title "Helm chart v${VERSION}" \
            --notes-file release-notes.md \
            --verify-tag \
            "discourse-${VERSION}.tgz"
